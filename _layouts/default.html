<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <style>
      .page-wrap {
        display: flex;
        align-items: flex-start;
        gap: 2.5rem;
        max-width: 1180px;
        margin: 2.5rem auto;
        padding: 0 1.25rem;
      }
      .side-nav {
        flex: 0 0 220px;
        position: sticky;
        top: 1.5rem;
        align-self: flex-start;
      }
      .side-nav h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #57606a;
        border: 0;
        margin: 0 0 0.75rem 0;
        padding: 0;
      }
      .side-nav ul { list-style: none; margin: 0; padding: 0; }
      .side-nav li { margin: 0; }
      .side-nav a {
        display: block;
        padding: 6px 10px;
        border-radius: 6px;
        color: #24292f;
        text-decoration: none;
        font-size: 14px;
        line-height: 1.3;
      }
      .side-nav a:hover { background: #f3f4f6; text-decoration: none; }
      .side-nav a.sub { padding-left: 22px; color: #57606a; font-size: 13px; }
      .page-content { flex: 1 1 auto; min-width: 0; }
      @media (max-width: 800px) {
        .page-wrap { flex-direction: column; gap: 1.25rem; }
        .side-nav { position: static; flex-basis: auto; width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="page-wrap">
      <nav class="side-nav markdown-body" aria-label="Sections">
        <h2>Sections</h2>
        <ul>
          <li><a href="#week-1">Week 1 — FPAS Mark II</a></li>
          <li><a href="#week-2">Week 2 — FPAS Mark II</a></li>
          <li><a href="#building-risk-scenarios">Building Risk Scenarios</a></li>
          <li><a href="#hands-on">Hands-on model files</a></li>
          <li><a href="#dsge-week-2">Week 2 — DSGE Models for Monetary and Fiscal Policy</a></li>
        </ul>
      </nav>
      <main class="page-content markdown-body">
        {{ content }}
      </main>
    </div>
  </body>
</html>
